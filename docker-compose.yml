# Local development only: production runs on Vercel (frontend) + Railway (backend + Postgres).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stocks
      POSTGRES_PASSWORD: stocks
      POSTGRES_DB: stocks
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocks -d stocks"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
